<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Byrom plc — Where every experience counts</title>
<meta name="description" content="Byrom plc — global sports event management & consultancy. Ticketing, accommodation, hospitality, transport and IT for the world's greatest sporting events.">
<script>document.documentElement.classList.add('js');</script>
<link rel="stylesheet" href="/src/colors_and_type.css">
<link rel="stylesheet" href="/src/home.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script src="/src/js/logos.js"></script>
<script src="/src/js/mapdata.js"></script>
<script type="text/babel" src="/src/js/Primitives.jsx"></script>
<script type="text/babel" src="/src/js/Navbar.jsx"></script>
<script type="text/babel" src="/src/js/SectionsHero.jsx"></script>
<script type="text/babel" src="/src/js/SectionsMid.jsx"></script>
<script type="text/babel" src="/src/js/SectionsEnd.jsx"></script>
<script type="text/babel">
  function App() {
    React.useEffect(() => {
      if (window.lucide) window.lucide.createIcons();
      const els = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
      const reveal = () => {
        const vh = window.innerHeight || document.documentElement.clientHeight;
        els.forEach((el) => {
          if (el.classList.contains('is-in')) return;
          if (el.getBoundingClientRect().top < vh * 0.9) el.classList.add('is-in');
        });
      };
      reveal();
      window.addEventListener('scroll', reveal, { passive: true });
      window.addEventListener('resize', reveal);
      const t = setTimeout(() => els.forEach((el) => el.classList.add('is-in')), 2500);
      return () => { window.removeEventListener('scroll', reveal); window.removeEventListener('resize', reveal); clearTimeout(t); };
    }, []);
    return (
      <React.Fragment>
        <Navbar />
        <main>
          <Hero />
          <Intro />
          <StatsBand />
          <Services />
          <Gallery />
          <Tech />
          <TrackRecord />
          <Timeline />
          <Group />
          <Presence />
          <WorldMap />
          <Closing />
        </main>
        <Footer />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
